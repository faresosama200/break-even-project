{% extends "base.html" %}
{% block title %}Register{% endblock %}
{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <i class="fas fa-user-plus auth-icon"></i>
            <h1>Create Account</h1>
            <p>Start analyzing your business feasibility</p>
        </div>
        <form method="POST" class="auth-form" novalidate>
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="form-row">
                <div class="form-group">
                    <label for="username"><i class="fas fa-user"></i> Username *</label>
                    <input type="text" id="username" name="username" class="form-control"
                           value="{{ username | default('') }}" required
                           placeholder="Choose a username" minlength="3">
                </div>
                <div class="form-group">
                    <label for="email"><i class="fas fa-envelope"></i> Email *</label>
                    <input type="email" id="email" name="email" class="form-control"
                           value="{{ email | default('') }}" required
                           placeholder="your@email.com">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label for="full_name"><i class="fas fa-id-card"></i> Full Name</label>
                    <input type="text" id="full_name" name="full_name" class="form-control"
                           value="{{ full_name | default('') }}"
                           placeholder="Your full name">
                </div>
                <div class="form-group">
                    <label for="company_name"><i class="fas fa-building"></i> Company</label>
                    <input type="text" id="company_name" name="company_name" class="form-control"
                           value="{{ company_name | default('') }}"
                           placeholder="Company name (optional)">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label for="password"><i class="fas fa-lock"></i> Password *</label>
                    <input type="password" id="password" name="password" class="form-control"
                           required placeholder="Min 8 characters" minlength="8">
                </div>
                <div class="form-group">
                    <label for="confirm_password"><i class="fas fa-lock"></i> Confirm *</label>
                    <input type="password" id="confirm_password" name="confirm_password"
                           class="form-control" required placeholder="Repeat password">
                </div>
            </div>
            <button type="submit" class="btn btn-primary btn-block">
                <i class="fas fa-user-plus"></i> Create Account
            </button>
        </form>
        <div class="auth-footer">
            <p>Already have an account? <a href="{{ url_for('auth.login') }}">Sign in</a></p>
        </div>
    </div>
</div>
{% endblock %}
