{% extends "base.html" %}
{% block title %}Profile{% endblock %}
{% block content %}
<div class="container">
    <div class="page-header">
        <h1><i class="fas fa-user-cog"></i> Profile Settings</h1>
    </div>
    <div class="card" style="max-width:600px;">
        <div class="card-body">
            <form method="POST" novalidate>
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" class="form-control" value="{{ current_user.username }}" disabled>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="text" class="form-control" value="{{ current_user.email }}" disabled>
                </div>
                <div class="form-group">
                    <label for="full_name">Full Name</label>
                    <input type="text" id="full_name" name="full_name" class="form-control"
                           value="{{ current_user.full_name or '' }}">
                </div>
                <div class="form-group">
                    <label for="company_name">Company Name</label>
                    <input type="text" id="company_name" name="company_name" class="form-control"
                           value="{{ current_user.company_name or '' }}">
                </div>
                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-save"></i> Save Changes
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
